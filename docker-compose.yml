services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watchtube
      POSTGRES_PASSWORD: watchtube
      POSTGRES_DB: watchtube
    ports:
      - "5432:5432"
    volumes:
      - watchtube_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchtube -d watchtube"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - watchtube_minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 4
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb -p local/watchtube-videos || true
        mc anonymous set download local/watchtube-videos || true
        printf '%s\n' '[{"AllowedOrigins":["http://localhost:5173","http://localhost:5174","http://localhost:4173","http://127.0.0.1:5173","http://127.0.0.1:5174","http://127.0.0.1:4173"],"AllowedMethods":["GET","PUT","HEAD","OPTIONS"],"AllowedHeaders":["*"],"ExposeHeaders":["Accept-Ranges","Content-Length","Content-Range","Content-Type","Date","ETag","x-amz-request-id","x-amz-version-id","x-amz-id-2"],"MaxAgeSeconds":86400}]' > /tmp/cors.json
        mc cors set local/watchtube-videos /tmp/cors.json || true
        exit 0

volumes:
  watchtube_pg:
  watchtube_minio:
